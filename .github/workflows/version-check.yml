# Validates package.json version against the branch flow:
#   - PR → main:           PR version must be strictly greater than main's.
#   - PR → release/vX.Y.Z: package.json version must equal X.Y.Z.
#   - PR from release/vX.Y.Z: package.json version must equal X.Y.Z.
# All PR refs go through env: (never interpolated into shell) to prevent
# command injection via attacker-controlled fork branch names.
name: Version check

on:
  pull_request:
    branches:
      - main
      - 'release/v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
      SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read PR version
        id: pr_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "PR version: $VERSION"

      - name: Validate base branch (target)
        id: base
        run: |
          if [[ "$BASE_BRANCH" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "is_release_target=true" >> "$GITHUB_OUTPUT"
            echo "target_release_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_target=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate source branch
        id: source
        run: |
          if [[ "$SOURCE_BRANCH" =~ ^release/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "is_release_source=true" >> "$GITHUB_OUTPUT"
            echo "source_release_version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "is_release_source=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check version bump (PR → main)
        if: env.BASE_BRANCH == 'main'
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.version }}
        run: |
          MAIN_VERSION=$(git show "origin/${BASE_BRANCH}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf-8')).version")
          echo "Main version: $MAIN_VERSION"
          echo "PR version:   $PR_VERSION"

          compare_versions() {
            IFS='.' read -ra A <<< "$1"
            IFS='.' read -ra B <<< "$2"
            for i in 0 1 2; do
              if   [ "${A[$i]:-0}" -gt "${B[$i]:-0}" ]; then return 0
              elif [ "${A[$i]:-0}" -lt "${B[$i]:-0}" ]; then return 1
              fi
            done
            return 1
          }

          if ! compare_versions "$PR_VERSION" "$MAIN_VERSION"; then
            echo "::error::PR version ($PR_VERSION) must be greater than main version ($MAIN_VERSION)."
            exit 1
          fi
          echo "Version properly bumped: $MAIN_VERSION → $PR_VERSION"

      - name: Check version matches target release branch
        if: steps.base.outputs.is_release_target == 'true'
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.version }}
          RELEASE_VERSION: ${{ steps.base.outputs.target_release_version }}
        run: |
          if [[ "$PR_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "::error::package.json version ($PR_VERSION) does not match target release branch (release/v$RELEASE_VERSION)."
            exit 1
          fi

      - name: Check version matches source release branch
        if: steps.source.outputs.is_release_source == 'true'
        env:
          PR_VERSION: ${{ steps.pr_version.outputs.version }}
          RELEASE_VERSION: ${{ steps.source.outputs.source_release_version }}
        run: |
          if [[ "$PR_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "::error::package.json version ($PR_VERSION) does not match source release branch (release/v$RELEASE_VERSION)."
            exit 1
          fi
