name: Guard branch flow

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  # ─────────────────────────────────────────────────────────────
  # main  ←  release/vX.Y.Z   (release promotion)
  # ─────────────────────────────────────────────────────────────
  gate-main:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Only release/vX.Y.Z may target main
        env:
          HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "PR → main from $HEAD"
          if [[ ! "$HEAD" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Only release/vX.Y.Z branches may merge into main."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # release/vX.Y.Z  ←  dev   (release cut)
  # ─────────────────────────────────────────────────────────────
  gate-release:
    if: startsWith(github.event.pull_request.base.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - name: Only dev may target release/vX.Y.Z
        env:
          HEAD: ${{ github.event.pull_request.head.ref }}
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          echo "PR → $BASE from $HEAD"
          if [[ "$HEAD" != "dev" ]]; then
            echo "::error::Only the dev branch may merge into release/vX.Y.Z."
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # dev  ←  work branches   (everyday development)
  # ─────────────────────────────────────────────────────────────
  gate-dev:
    if: github.event.pull_request.base.ref == 'dev'
    runs-on: ubuntu-latest
    steps:
      - name: Only work branches may target dev
        env:
          HEAD: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "PR → dev from $HEAD"
          if [[ ! "$HEAD" =~ ^(fix|feature|refactor|chore|docs|ci-cd|changelog|codex)/[A-Za-z0-9._/=-]+$ ]]; then
            echo "::error::Branch must start with fix/, feature/, refactor/, chore/, docs/, ci-cd/, changelog/, or codex/."
            exit 1
          fi
