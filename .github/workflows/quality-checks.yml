# Runs `make check` (build + tests) on every PR. Its status check is required
# by the branch-protection ruleset before anything can merge into main.
name: Quality Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: make install

      - name: Run quality checks
        run: make check
